<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yumeka — Your Anime Library</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --card: #0f3460;
      --accent: #e94560;
      --accent-soft: #ff6b9d;
      --text: #ffffff;
      --text-muted: #a0a0b0;
      --text-faint: #505070;
      --radius: 12px;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
    }
    .logo-kanji {
      font-size: 3rem;
      color: var(--accent-soft);
      letter-spacing: 0.05em;
      line-height: 1;
    }
    .logo-latin {
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      color: var(--text-muted);
      margin-top: 0.5rem;
      text-transform: uppercase;
    }
    .tagline {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-top: 2.5rem;
      font-weight: 300;
      max-width: 360px;
      line-height: 1.6;
    }
    .pill {
      display: inline-block;
      background: var(--card);
      color: var(--accent-soft);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      margin-top: 2rem;
      border: 1px solid var(--accent);
    }
    .links {
      margin-top: 3.5rem;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      color: var(--text-faint);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.03em;
      transition: color 0.2s;
    }
    .links a:hover {
      color: var(--accent-soft);
    }
    .divider {
      color: var(--text-faint);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="logo-kanji">夢華</div>
  <div class="logo-latin">Y U M E K A</div>
  <p class="tagline">Your personal anime library. Track, organize, and discover — your way.</p>
  <div class="pill">Coming soon to iOS &amp; Android</div>
  <nav class="links">
    <a href="/privacy.html">Privacy Policy</a>
    <span class="divider">·</span>
    <a href="/support.html">Support</a>
    <span class="divider">·</span>
    <a href="/donate.html">Support the Developer</a>
  </nav>
</body>
</html>
